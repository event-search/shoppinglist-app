<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ショッピングリスト</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    header {
      background: #4f8ef7;
      color: #fff;
      padding: 24px 24px 20px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    #item-count {
      font-size: 0.85rem;
      opacity: 0.85;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px 24px;
      border-bottom: 1px solid #e8edf2;
    }

    #new-item {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d0d8e4;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #new-item:focus {
      border-color: #4f8ef7;
    }

    #add-btn {
      padding: 10px 18px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
      line-height: 1;
    }

    #add-btn:hover {
      background: #3a7de8;
    }

    .filters {
      display: flex;
      gap: 0;
      padding: 12px 24px 0;
    }

    .filter-btn {
      flex: 1;
      padding: 7px;
      border: none;
      background: none;
      color: #7a8fa6;
      font-size: 0.82rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .filter-btn.active {
      color: #4f8ef7;
      border-bottom-color: #4f8ef7;
      font-weight: 600;
    }

    #list {
      list-style: none;
      padding: 8px 0;
      min-height: 60px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      border-bottom: 1px solid #f0f4f8;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:last-child {
      border-bottom: none;
    }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #c0cdd8;
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 0.75rem;
      color: transparent;
    }

    .item.checked .check-btn {
      background: #4f8ef7;
      border-color: #4f8ef7;
      color: #fff;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3a4a;
      transition: all 0.2s;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #a0aab4;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #c0cdd8;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s;
      line-height: 1;
    }

    .delete-btn:hover {
      color: #e05252;
    }

    .empty-msg {
      text-align: center;
      color: #a0aab4;
      padding: 32px 0;
      font-size: 0.9rem;
    }

    footer {
      padding: 12px 24px;
      border-top: 1px solid #e8edf2;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #checked-count {
      font-size: 0.82rem;
      color: #a0aab4;
    }

    #clear-checked {
      background: none;
      border: none;
      color: #e05252;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    #clear-checked:hover {
      background: #fdeaea;
    }

    #clear-checked:disabled {
      color: #c0cdd8;
      cursor: default;
      background: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>ショッピングリスト</h1>
      <div id="item-count">0 件</div>
    </header>

    <div class="input-area">
      <input id="new-item" type="text" placeholder="アイテムを追加…" autocomplete="off">
      <button id="add-btn" title="追加">＋</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="unchecked">未完了</button>
      <button class="filter-btn" data-filter="checked">完了</button>
    </div>

    <ul id="list"></ul>

    <footer>
      <span id="checked-count"></span>
      <button id="clear-checked">完了済みを削除</button>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://nconbpdchewwuqrshowd.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_b07bUSyw3J0FZMllM4j3Rg_iXxPqKRW';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];
    let filter = 'all';

    const listEl          = document.getElementById('list');
    const newItemEl       = document.getElementById('new-item');
    const addBtn          = document.getElementById('add-btn');
    const itemCountEl     = document.getElementById('item-count');
    const checkedCountEl  = document.getElementById('checked-count');
    const clearCheckedBtn = document.getElementById('clear-checked');

    async function loadItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: false });
      if (!error) {
        items = data;
        render();
      }
    }

    function render() {
      const filtered = items.filter(item => {
        if (filter === 'checked')   return item.checked;
        if (filter === 'unchecked') return !item.checked;
        return true;
      });

      listEl.innerHTML = '';

      if (filtered.length === 0) {
        listEl.innerHTML = '<li class="empty-msg">アイテムがありません</li>';
      } else {
        filtered.forEach(item => {
          const li = document.createElement('li');
          li.className = 'item' + (item.checked ? ' checked' : '');
          li.dataset.id = item.id;
          li.innerHTML = `
            <button class="check-btn" title="チェック">✓</button>
            <span class="item-text">${escapeHtml(item.text)}</span>
            <button class="delete-btn" title="削除">✕</button>
          `;
          listEl.appendChild(li);
        });
      }

      const total   = items.length;
      const checked = items.filter(i => i.checked).length;
      itemCountEl.textContent    = `${total} 件`;
      checkedCountEl.textContent = checked > 0 ? `${checked} 件完了` : '';
      clearCheckedBtn.disabled   = checked === 0;
    }

    async function addItem() {
      const text = newItemEl.value.trim();
      if (!text) return;
      const { data, error } = await db
        .from('shopping_items')
        .insert({ text, checked: false })
        .select()
        .single();
      if (!error) {
        items.unshift(data);
        newItemEl.value = '';
        render();
      }
    }

    async function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      const { error } = await db
        .from('shopping_items')
        .update({ checked: !item.checked })
        .eq('id', id);
      if (!error) {
        item.checked = !item.checked;
        render();
      }
    }

    async function deleteItem(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);
      if (!error) {
        items = items.filter(i => i.id !== id);
        render();
      }
    }

    async function clearChecked() {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('checked', true);
      if (!error) {
        items = items.filter(i => !i.checked);
        render();
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    addBtn.addEventListener('click', addItem);
    newItemEl.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
    clearCheckedBtn.addEventListener('click', clearChecked);

    listEl.addEventListener('click', e => {
      const li = e.target.closest('.item');
      if (!li) return;
      const id = Number(li.dataset.id);
      if (e.target.closest('.check-btn'))  toggleItem(id);
      if (e.target.closest('.delete-btn')) deleteItem(id);
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    loadItems();
  </script>
</body>
</html>
